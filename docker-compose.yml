services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: "postgresql://chess:chess@postgres:5432/chess?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_ACCESS_SECRET: "dev-access-secret-change-me"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-me"
      ACCESS_TTL: "15m"
      REFRESH_TTL: "30d"
      PORT: "3000"
      WEB_ORIGIN: "http://localhost:5173"
      SIGNUP_GRANT: "1000"
      PLATFORM_FEE_BPS: "10"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      VITE_API_URL: "http://localhost:3000"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
