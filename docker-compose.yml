services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: "postgresql://chess:chess@postgres:5432/chess?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_ACCESS_SECRET: "dev-access-secret-change-me"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-me"
      ACCESS_TTL: "15m"
      REFRESH_TTL: "30d"
      PORT: "3000"
      # Leave WEB_ORIGIN unset so CORS reflects the request origin — this lets
      # dynamic hosts (GitHub Codespaces forwarded URLs) work without config.
      # Set it to a fixed domain for production.
      SIGNUP_GRANT: "1000"
      PLATFORM_FEE_BPS: "10"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    # No VITE_API_URL: the client auto-derives the API URL from the browser
    # location (works on localhost and Codespaces). Set VITE_API_URL only to
    # pin a custom API endpoint.
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
